<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arq BIM - Painel Administrativo</title>
    <style>
        :root {
            --rosa: #e07ab0;
            --rosa-claro: #f8c1d9;
            --azul: #4a9eff;
            --azul-claro: #a5d6ff;
            --bg: #0f172a;
            --surface: #1e2937;
            --border: #334155;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: #e2e8f0;
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
        }
        header {
            background: var(--surface);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--rosa);
        }
        .user-info {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .main {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .card {
            background: var(--surface);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            margin-bottom: 2rem;
        }
        .dropzone {
            border: 3px dashed var(--azul-claro);
            border-radius: 12px;
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(74, 158, 255, 0.05);
            margin: 1rem 0;
        }
        .dropzone:hover, .dropzone.dragover {
            border-color: var(--rosa);
            background: rgba(224, 122, 176, 0.1);
        }
        input, textarea {
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 1rem;
            width: 100%;
            background: #334155;
            color: white;
            margin-bottom: 1rem;
        }
        textarea {
            resize: vertical;
            min-height: 60px;
        }
        button {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--rosa);
            color: white;
            width: 100%;
        }
        .btn-primary:hover:not(:disabled) {
            background: #c25a95;
            transform: translateY(-1px);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-danger {
            background: #ef4444;
            color: white;
            padding: 6px 12px;
            font-size: 0.8rem;
            width: auto;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        .btn-secondary {
            background: var(--border);
            color: white;
            padding: 6px 12px;
            font-size: 0.8rem;
            width: auto;
        }
        .btn-secondary:hover {
            background: #475569;
        }
        .file-list {
            margin-top: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .file-tag {
            background: #334155;
            padding: 6px 12px;
            border-radius: 9999px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .file-tag .remove {
            cursor: pointer;
            color: #f87171;
            font-weight: bold;
        }
        .file-tag .remove:hover {
            color: #ef4444;
        }
        .project-item {
            background: #1a2433;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .project-item .info {
            flex: 1;
        }
        .project-item .info .name {
            font-weight: 600;
            color: var(--rosa);
        }
        .project-item .info .meta {
            font-size: 0.8rem;
            color: #94a3b8;
        }
        .project-item .actions {
            display: flex;
            gap: 0.5rem;
        }
        .project-item .actions a {
            color: var(--azul);
            text-decoration: none;
            padding: 4px 12px;
            border-radius: 4px;
            background: rgba(74, 158, 255, 0.1);
            font-size: 0.8rem;
        }
        .project-item .actions a:hover {
            background: rgba(74, 158, 255, 0.2);
        }
        .login-card {
            max-width: 400px;
            margin: 4rem auto;
        }
        .login-card .error {
            color: #ef4444;
            margin-top: 0.5rem;
            display: none;
        }
        .status-success { color: #4ade80; }
        .status-error { color: #ef4444; }
        .loading-text { color: #94a3b8; }
        .empty-text { color: #94a3b8; text-align: center; padding: 2rem; }
    </style>
</head>
<body>
    <div id="app">
        <!-- Login Screen -->
        <div id="loginScreen" style="display:none;">
            <div class="main login-card">
                <div class="card">
                    <h2 style="margin-bottom:1rem;">🔐 Login</h2>
                    <p style="color:#94a3b8; margin-bottom:1rem; font-size:0.9rem;">
                        Usuário: <strong>admin</strong> | Senha: <strong>admin123</strong>
                    </p>
                    <input type="text" id="loginUser" placeholder="Usuário" value="admin">
                    <input type="password" id="loginPass" placeholder="Senha" value="admin123">
                    <div class="error" id="loginError">Credenciais inválidas</div>
                    <button class="btn-primary" id="loginBtn">Entrar</button>
                </div>
            </div>
        </div>

        <!-- Admin Screen -->
        <div id="adminScreen" style="display:none;">
            <header>
                <div class="logo">Arq <span style="color:var(--azul)">BIM</span></div>
                <h1>Painel Administrativo</h1>
                <div class="user-info">
                    <span id="userName">Admin</span>
                    <button class="btn-danger" id="logoutBtn" style="width:auto;">Sair</button>
                </div>
            </header>

            <div class="main">
                <div class="card">
                    <h2>📤 Novo Projeto</h2>
                    <input type="text" id="projectName" placeholder="Nome do Projeto">
                    <textarea id="projectDesc" placeholder="Descrição (opcional)"></textarea>

                    <div class="dropzone" id="dropzone">
                        <p style="font-size:1.1rem; margin-bottom:8px;">📁 Arraste GLB, GLTF, OBJ ou FBX aqui</p>
                        <p>ou <strong>clique para selecionar</strong></p>
                        <p style="font-size:0.8rem; color:#94a3b8; margin-top:8px;">Máx. 500MB</p>
                        <input type="file" id="fileInput" style="display:none" multiple accept=".glb,.gltf,.obj,.fbx,.bin,.png,.jpg,.jpeg">
                    </div>

                    <div class="file-list" id="fileList"></div>
                    <button class="btn-primary" id="uploadBtn">Enviar Projeto</button>
                    <div id="uploadStatus" style="margin-top:0.5rem; font-size:0.9rem;"></div>
                </div>

                <div class="card">
                    <h2>📋 Projetos</h2>
                    <div id="projectsList">
                        <p class="loading-text">Carregando...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============ Gerenciamento de Autenticação ============
        let selectedFiles = [];

        function getToken() {
            return localStorage.getItem('token');
        }

        function setToken(token) {
            if (token) {
                localStorage.setItem('token', token);
            } else {
                localStorage.removeItem('token');
            }
        }

        async function apiFetch(endpoint, options = {}) {
            const token = getToken();
            const headers = {
                ...options.headers
            };
            
            if (token && !(options.body instanceof FormData)) {
                headers['Authorization'] = `Bearer ${token}`;
            }

            const response = await fetch(endpoint, {
                ...options,
                headers
            });

            if (response.status === 401) {
                setToken(null);
                showLogin();
                throw new Error('Sessão expirada');
            }

            return response;
        }

        // ============ Login ============
        async function handleLogin() {
            const username = document.getElementById('loginUser').value.trim();
            const password = document.getElementById('loginPass').value.trim();
            const errorEl = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');
            
            errorEl.style.display = 'none';
            btn.textContent = '⏳ Entrando...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (res.ok) {
                    setToken(data.token);
                    showAdmin();
                } else {
                    errorEl.textContent = data.error || 'Credenciais inválidas';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = 'Erro de conexão com o servidor';
                errorEl.style.display = 'block';
            } finally {
                btn.textContent = 'Entrar';
                btn.disabled = false;
            }
        }

        function showLogin() {
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('adminScreen').style.display = 'none';
        }

        function showAdmin() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminScreen').style.display = 'block';
            loadProjects();
        }

        // ============ Logout ============
        document.getElementById('logoutBtn').addEventListener('click', () => {
            setToken(null);
            showLogin();
        });

        // ============ Eventos de Login ============
        document.getElementById('loginBtn').addEventListener('click', handleLogin);
        document.getElementById('loginPass').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
        document.getElementById('loginUser').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleLogin();
        });

        // ============ Verificar Sessão ============
        if (getToken()) {
            showAdmin();
        } else {
            showLogin();
        }

        // ============ Upload ============
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const uploadBtn = document.getElementById('uploadBtn');

        dropzone.addEventListener('click', () => fileInput.click());

        dropzone.addEventListener('dragover', e => {
            e.preventDefault();
            dropzone.classList.add('dragover');
        });

        dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
        
        dropzone.addEventListener('drop', e => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) handleFiles(fileInput.files);
            fileInput.value = ''; // Reset para permitir mesmo arquivo novamente
        });

        function handleFiles(files) {
            const validExtensions = ['.glb', '.gltf', '.obj', '.fbx', '.bin', '.png', '.jpg', '.jpeg'];
            const validFiles = Array.from(files).filter(f => {
                const ext = '.' + f.name.split('.').pop().toLowerCase();
                return validExtensions.includes(ext);
            });

            if (validFiles.length === 0) {
                alert('Por favor, selecione arquivos válidos: GLB, GLTF, OBJ, FBX, BIN, PNG, JPG ou JPEG');
                return;
            }

            selectedFiles = validFiles;
            renderFileList();
        }

        function renderFileList() {
            fileList.innerHTML = selectedFiles.map((f, i) => 
                `<div class="file-tag">
                    ${f.name} (${(f.size / 1024 / 1024).toFixed(1)}MB)
                    <span class="remove" onclick="removeFile(${i})">×</span>
                </div>`
            ).join('');
        }

        window.removeFile = function(i) {
            selectedFiles.splice(i, 1);
            renderFileList();
        };

        uploadBtn.addEventListener('click', async () => {
            const name = document.getElementById('projectName').value.trim();
            if (!name) {
                alert('Digite o nome do projeto');
                return;
            }
            if (selectedFiles.length === 0) {
                alert('Selecione pelo menos um arquivo');
                return;
            }

            const form = new FormData();
            form.append('name', name);
            form.append('description', document.getElementById('projectDesc').value.trim());

            selectedFiles.forEach(file => form.append('files', file));

            uploadBtn.textContent = '⏳ Enviando...';
            uploadBtn.disabled = true;
            const statusEl = document.getElementById('uploadStatus');
            statusEl.className = '';
            statusEl.textContent = 'Enviando arquivos...';

            try {
                const res = await fetch('/api/projects', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${getToken()}`
                    },
                    body: form
                });

                const data = await res.json();

                if (res.ok) {
                    statusEl.className = 'status-success';
                    statusEl.textContent = '✅ ' + (data.message || 'Projeto enviado com sucesso!');
                    selectedFiles = [];
                    renderFileList();
                    document.getElementById('projectName').value = '';
                    document.getElementById('projectDesc').value = '';
                    loadProjects();
                } else {
                    statusEl.className = 'status-error';
                    statusEl.textContent = '❌ ' + (data.error || 'Falha no upload');
                }
            } catch (err) {
                statusEl.className = 'status-error';
                statusEl.textContent = '❌ Erro de conexão com o servidor';
            } finally {
                uploadBtn.textContent = 'Enviar Projeto';
                uploadBtn.disabled = false;
            }
        });

        // ============ Listar Projetos ============
        async function loadProjects() {
            const container = document.getElementById('projectsList');
            container.innerHTML = '<p class="loading-text">Carregando...</p>';

            try {
                const res = await apiFetch('/api/projects');
                
                if (!res.ok) {
                    throw new Error('Erro ao carregar projetos');
                }

                const projects = await res.json();

                if (!projects || projects.length === 0) {
                    container.innerHTML = '<p class="empty-text">Nenhum projeto cadastrado ainda</p>';
                    return;
                }

                container.innerHTML = projects.map(p => `
                    <div class="project-item">
                        <div class="info">
                            <div class="name">${escapeHtml(p.name)}</div>
                            <div class="meta">
                                ${p.description ? escapeHtml(p.description) : 'Sem descrição'} • 
                                ${escapeHtml(p.file_name)} • 
                                ${formatDate(p.created_at)}
                            </div>
                        </div>
                        <div class="actions">
                            <a href="/v/${p.slug}" target="_blank">👁️ Ver</a>
                            <button class="btn-danger" onclick="deleteProject('${p.slug}')">🗑️</button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                container.innerHTML = `<p class="status-error">❌ ${err.message}</p>`;
            }
        }

        // ============ Deletar Projeto ============
        window.deleteProject = async function(slug) {
            if (!confirm('Tem certeza que deseja excluir este projeto?')) return;

            try {
                const res = await apiFetch(`/api/projects/${slug}`, {
                    method: 'DELETE'
                });

                if (res.ok) {
                    loadProjects();
                } else {
                    const data = await res.json();
                    alert('Erro ao excluir: ' + (data.error || 'Erro desconhecido'));
                }
            } catch (err) {
                alert('Erro de conexão ao excluir projeto');
            }
        };

        // ============ Utilitários ============
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateStr) {
            try {
                return new Date(dateStr).toLocaleDateString('pt-BR', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            } catch {
                return dateStr;
            }
        }

        // ============ Recarregar projetos a cada 30 segundos ============
        setInterval(() => {
            if (getToken()) {
                loadProjects();
            }
        }, 30000);
    </script>
</body>
</html>
