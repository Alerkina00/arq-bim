<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arq BIM - Painel Administrativo</title>
  <style>
    :root {
      --rosa: #e07ab0;
      --rosa-claro: #f8c1d9;
      --azul: #4a9eff;
      --azul-claro: #a5d6ff;
      --bg: #0f172a;
      --surface: #1e2937;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }
    header {
      background: #1e2937;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border-bottom: 1px solid #334155;
    }
    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--rosa);
    }
    .main {
      max-width: 1000px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    .card {
      background: var(--surface);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
    }
    .dropzone {
      border: 3px dashed var(--azul-claro);
      border-radius: 12px;
      padding: 4rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: rgba(74, 158, 255, 0.05);
    }
    .dropzone:hover, .dropzone.dragover {
      border-color: var(--rosa);
      background: rgba(224, 122, 176, 0.1);
    }
    input, button {
      padding: 12px 20px;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
    }
    input {
      width: 100%;
      background: #334155;
      color: white;
      margin-bottom: 1rem;
    }
    button {
      background: var(--rosa);
      color: white;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: 1rem;
    }
    button:hover {
      background: #c25a95;
    }
    .file-list {
      margin-top: 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .file-tag {
      background: #334155;
      padding: 6px 12px;
      border-radius: 9999px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">Arq <span style="color:#a5d6ff">BIM</span></div>
    <h1>Painel Administrativo</h1>
  </header>

  <div class="main">
    <div class="card">
      <h2>Novo Projeto</h2>
      <input type="text" id="name" placeholder="Nome do Projeto" value="Projeto Teste">
      <input type="text" id="desc" placeholder="Descrição (opcional)">

      <div class="dropzone" id="dropzone">
        <p style="font-size:1.1rem; margin-bottom:8px;">📁 Arraste GLB, GLTF, OBJ ou FBX aqui</p>
        <p>ou <strong>clique para selecionar</strong></p>
        <input type="file" id="fileInput" style="display:none" accept=".glb,.gltf,.obj,.fbx,.bin,.png,.jpg,.jpeg">
      </div>

      <div class="file-list" id="fileList"></div>
      <button id="uploadBtn">Enviar Projeto</button>
    </div>
  </div>

  <script>
    let selectedFiles = [];
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const uploadBtn = document.getElementById('uploadBtn');

    dropzone.addEventListener('click', () => fileInput.click());

    dropzone.addEventListener('dragover', e => {
      e.preventDefault();
      dropzone.classList.add('dragover');
    });

    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', e => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      handleFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files.length) handleFiles(fileInput.files);
    });

    function handleFiles(files) {
      selectedFiles = Array.from(files);
      renderFileList();
    }

    function renderFileList() {
      fileList.innerHTML = selectedFiles.map((f, i) => 
        `<div class="file-tag">${f.name} <span onclick="removeFile(${i})" style="cursor:pointer;color:#f87171">×</span></div>`
      ).join('');
    }

    window.removeFile = function(i) {
      selectedFiles.splice(i, 1);
      renderFileList();
    };

    uploadBtn.addEventListener('click', async () => {
      const name = document.getElementById('name').value.trim();
      if (!name) return alert('Digite o nome do projeto');
      if (selectedFiles.length === 0) return alert('Selecione pelo menos um arquivo');

      const form = new FormData();
      form.append('name', name);
      form.append('description', document.getElementById('desc').value);

      selectedFiles.forEach(file => form.append('files', file));

      uploadBtn.textContent = 'Enviando...';
      uploadBtn.disabled = true;

      try {
        const res = await fetch('/api/projects', {
          method: 'POST',
          body: form
        });
        const data = await res.json();

        if (res.ok) {
          alert('✅ Projeto enviado com sucesso!');
          selectedFiles = [];
          renderFileList();
        } else {
          alert('Erro: ' + (data.error || 'Falha no upload'));
        }
      } catch (err) {
        alert('Erro de conexão');
      } finally {
        uploadBtn.textContent = 'Enviar Projeto';
        uploadBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
