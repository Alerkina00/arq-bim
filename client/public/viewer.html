<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arq BIM Viewer</title>
    <style>
        body { margin:0; overflow:hidden; background:#0a0e1a; font-family:system-ui; }
        canvas { display:block; }
        #header {
            position:fixed;
            top:0;
            left:0;
            right:0;
            background:rgba(10,14,26,0.9);
            padding:1rem;
            color:white;
            z-index:10;
            display:flex;
            justify-content:space-between;
            align-items:center;
            backdrop-filter:blur(10px);
            border-bottom:1px solid rgba(255,255,255,0.1);
        }
        .logo {
            color: #e07ab0;
            font-weight:700;
            font-size:1.2rem;
        }
        #title {
            color: #94a3b8;
            font-size:0.9rem;
        }
        #loading {
            position:fixed;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            color:#94a3b8;
            text-align:center;
        }
        #loading .spinner {
            display:inline-block;
            width:40px;
            height:40px;
            border:4px solid #334155;
            border-top-color:#e07ab0;
            border-radius:50%;
            animation:spin 1s linear infinite;
            margin-bottom:1rem;
        }
        @keyframes spin {
            to { transform:rotate(360deg); }
        }
        #error {
            display:none;
            position:fixed;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            color:#ef4444;
            text-align:center;
            background:rgba(239,68,68,0.1);
            padding:2rem;
            border-radius:12px;
            border:1px solid #ef4444;
        }
    </style>
</head>
<body>
    <div id="header">
        <div class="logo">Arq BIM</div>
        <div id="title">Carregando modelo...</div>
    </div>

    <div id="loading">
        <div class="spinner"></div>
        <p>Carregando modelo 3D...</p>
    </div>

    <div id="error">
        <h3>❌ Erro ao carregar modelo</h3>
        <p id="errorMessage">Modelo não encontrado</p>
        <button onclick="window.location.href='/admin'" style="margin-top:1rem;padding:8px 20px;background:#e07ab0;border:none;border-radius:6px;color:white;cursor:pointer;">
            Voltar ao Admin
        </button>
    </div>

    <canvas id="canvas"></canvas>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/controls/OrbitControls.js';
        import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/loaders/GLTFLoader.js';

        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        const errorMessage = document.getElementById('errorMessage');
        const titleEl = document.getElementById('title');

        // Configurar cena
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0e1a);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(10, 8, 15);

        const renderer = new THREE.WebGLRenderer({
            canvas: document.getElementById('canvas'),
            antialias: true
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        // Controles
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 2;
        controls.maxDistance = 50;
        controls.target.set(0, 0, 0);

        // Iluminação
        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);

        const hemisphereLight = new THREE.HemisphereLight(0x87ceeb, 0x362d1e, 0.5);
        scene.add(hemisphereLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        scene.add(dirLight);

        const fillLight = new THREE.DirectionalLight(0x4a9eff, 0.5);
        fillLight.position.set(-10, 0, 10);
        scene.add(fillLight);

        // Grid e eixos auxiliares
        const gridHelper = new THREE.GridHelper(20, 20, 0x4a9eff, 0x1e2937);
        gridHelper.position.y = -0.01;
        scene.add(gridHelper);

        // Carregar modelo
        const loader = new GLTFLoader();
        const slug = window.location.pathname.split('/').pop();

        if (!slug) {
            showError('Slug do projeto não encontrado');
        } else {
            loader.load(
                `/api/proxy/${slug}`,
                (gltf) => {
                    // Modelo carregado com sucesso
                    const model = gltf.scene;
                    
                    // Centralizar modelo
                    const box = new THREE.Box3().setFromObject(model);
                    const center = box.getCenter(new THREE.Vector3());
                    model.position.sub(center);
                    
                    // Ajustar tamanho se necessário
                    const size = box.getSize(new THREE.Vector3());
                    const maxSize = Math.max(size.x, size.y, size.z);
                    if (maxSize > 10) {
                        const scale = 10 / maxSize;
                        model.scale.multiplyScalar(scale);
                    }

                    scene.add(model);
                    
                    // Atualizar controles para focar no modelo
                    controls.target.set(0, 0, 0);
                    controls.update();

                    // Esconder loading
                    loadingEl.style.display = 'none';
                    titleEl.textContent = 'Modelo carregado';
                },
                (progress) => {
                    // Progresso do loading
                    const percent = Math.round((progress.loaded / progress.total) * 100);
                    titleEl.textContent = `Carregando... ${percent}%`;
                },
                (error) => {
                    console.error('Erro ao carregar modelo:', error);
                    showError('Erro ao carregar o modelo 3D. Verifique se o arquivo é válido.');
                }
            );
        }

        function showError(message) {
            loadingEl.style.display = 'none';
            errorMessage.textContent = message;
            errorEl.style.display = 'block';
            titleEl.textContent = '❌ Erro';
        }

        // Animação
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // Redimensionamento
        window.addEventListener('resize', () => {
            const width = window.innerWidth;
            const height = window.innerHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        });

        // Keyboard shortcuts
        window.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') {
                controls.reset();
            }
        });
    </script>
</body>
</html>
